<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ContentGen Pro</title>
</head>
<body style="margin:0; padding:0; background:#0f172a; font-family:Arial; color:#e2e8f0;">

    <div style="padding:40px 20px; text-align:center;">
        <h1 style="color:#6366f1; font-size:48px; margin-bottom:10px;">⚡ ContentGen Pro</h1>
        <p style="font-size:18px; color:#94a3b8;">If you can see this, HTML works!</p>

        <div id="app" style="display:none; margin-top:40px; max-width:800px; margin-left:auto; margin-right:auto; text-align:left;">

            <h2 style="color:white; margin-bottom:20px;">🔌 Connected Accounts</h2>
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:12px; margin-bottom:30px;">

                <div style="background:#1e293b; border:1px solid #334155; border-radius:12px; padding:16px; text-align:center;" id="card-li">
                    <div style="font-size:28px; margin-bottom:8px;">💼</div>
                    <div style="color:white; font-weight:bold; margin-bottom:10px;">LinkedIn</div>
                    <button onclick="connect('li','LinkedIn')" style="padding:8px 16px; background:#0A66C2; color:white; border:none; border-radius:6px; cursor:pointer;">+ Connect</button>
                </div>

                <div style="background:#1e293b; border:1px solid #334155; border-radius:12px; padding:16px; text-align:center;" id="card-tw">
                    <div style="font-size:28px; margin-bottom:8px;">🐦</div>
                    <div style="color:white; font-weight:bold; margin-bottom:10px;">Twitter/X</div>
                    <button onclick="connect('tw','Twitter')" style="padding:8px 16px; background:#000; color:white; border:none; border-radius:6px; cursor:pointer;">+ Connect</button>
                </div>

                <div style="background:#1e293b; border:1px solid #334155; border-radius:12px; padding:16px; text-align:center;" id="card-ig">
                    <div style="font-size:28px; margin-bottom:8px;">📸</div>
                    <div style="color:white; font-weight:bold; margin-bottom:10px;">Instagram</div>
                    <button onclick="connect('ig','Instagram')" style="padding:8px 16px; background:#E4405F; color:white; border:none; border-radius:6px; cursor:pointer;">+ Connect</button>
                </div>

                <div style="background:#1e293b; border:1px solid #334155; border-radius:12px; padding:16px; text-align:center;" id="card-fb">
                    <div style="font-size:28px; margin-bottom:8px;">📘</div>
                    <div style="color:white; font-weight:bold; margin-bottom:10px;">Facebook</div>
                    <button onclick="connect('fb','Facebook')" style="padding:8px 16px; background:#1877F2; color:white; border:none; border-radius:6px; cursor:pointer;">+ Connect</button>
                </div>

                <div style="background:#1e293b; border:1px solid #334155; border-radius:12px; padding:16px; text-align:center;" id="card-yt">
                    <div style="font-size:28px; margin-bottom:8px;">▶️</div>
                    <div style="color:white; font-weight:bold; margin-bottom:10px;">YouTube</div>
                    <button onclick="connect('yt','YouTube')" style="padding:8px 16px; background:#FF0000; color:white; border:none; border-radius:6px; cursor:pointer;">+ Connect</button>
                </div>
            </div>

            <h2 style="color:white; margin-bottom:20px;">🎯 Generate Content</h2>
            <div style="background:#1e293b; border:1px solid #334155; border-radius:14px; padding:24px; margin-bottom:24px;">
                <label style="display:block; color:#94a3b8; margin-bottom:8px; font-size:14px;">Enter Your Topic:</label>
                <input type="text" id="topic" placeholder="Type any topic here..." style="width:100%; padding:14px; background:#0f172a; border:2px solid #475569; border-radius:8px; color:white; font-size:16px; box-sizing:border-box; outline:none; margin-bottom:16px;">

                <label style="display:block; color:#94a3b8; margin-bottom:10px; font-size:14px;">Select Platforms:</label>
                <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:18px;">
                    <button class="plat-btn" data-p="LinkedIn" onclick="toggle(this)" style="padding:10px 18px; background:#374151; border:1px solid #475569; border-radius:8px; color:#cbd5e1; cursor:pointer;">LinkedIn</button>
                    <button class="plat-btn" data-p="Twitter" onclick="toggle(this)" style="padding:10px 18px; background:#374151; border:1px solid #475569; border-radius:8px; color:#cbd5e1; cursor:pointer;">Twitter</button>
                    <button class="plat-btn" data-p="Instagram" onclick="toggle(this)" style="padding:10px 18px; background:#374151; border:1px solid #475569; border-radius:8px; color:#cbd5e1; cursor:pointer;">Instagram</button>
                    <button class="plat-btn" data-p="Facebook" onclick="toggle(this)" style="padding:10px 18px; background:#374151; border:1px solid #475569; border-radius:8px; color:#cbd5e1; cursor:pointer;">Facebook</button>
                    <button class="plat-btn" data-p="YouTube" onclick="toggle(this)" style="padding:10px 18px; background:#374151; border:1px solid #475569; border-radius:8px; color:#cbd5e1; cursor:pointer;">YouTube</button>
                </div>

                <button onclick="generate()" id="genBtn" disabled style="width:100%; padding:16px; background:#374151; border:none; border-radius:10px; color:#9ca3af; font-size:17px; font-weight:bold; cursor:not-allowed;">Generate Content</button>
            </div>

            <div id="output"></div>
        </div>
    </div>

<script>
// ====== CONFIG ======
// Ye aapka real deployed Cloudflare Worker URL hai
var BACKEND_URL = 'https://linkedin-post-backend.contentgenpro.workers.dev';

var selected = [];
var connected = {};
var contents = [];

var platformColors = { li: '#0A66C2', tw: '#000', ig: '#E4405F', fb: '#1877F2', yt: '#FF0000' };

var REAL_PLATFORMS = { li: true, fb: true };

window.addEventListener('DOMContentLoaded', function () {
    document.getElementById('app').style.display = 'block';
    checkLinkedInStatus();
    checkFacebookStatus();
});

function checkLinkedInStatus() {
    fetch(BACKEND_URL + '/api/linkedin/status', { credentials: 'include' })
        .then(function (r) { return r.json(); })
        .then(function (data) {
            if (data.connected) {
                connected['li'] = true;
                var card = document.getElementById('card-li');
                card.style.borderColor = '#10b981';
                var btn = card.querySelector('button');
                btn.textContent = 'Disconnect';
                btn.style.cssText = 'padding:8px 16px;background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.4);color:#f87171;border-radius:6px;cursor:pointer;';
                btn.onclick = function () { disconnect('li', 'LinkedIn'); };
            }
        })
        .catch(function () { });
}

function checkFacebookStatus() {
    fetch(BACKEND_URL + '/api/facebook/status', { credentials: 'include' })
        .then(function (r) { return r.json(); })
        .then(function (data) {
            if (data.connected) {
                connected['fb'] = true;
                var card = document.getElementById('card-fb');
                card.style.borderColor = '#10b981';
                var btn = card.querySelector('button');
                btn.textContent = 'Disconnect';
                btn.style.cssText = 'padding:8px 16px;background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.4);color:#f87171;border-radius:6px;cursor:pointer;';
                btn.onclick = function () { disconnect('fb', 'Facebook'); };
            }
        })
        .catch(function () { });
}

function connect(id, name) {
    if (id === 'li') { window.location.href = BACKEND_URL + '/auth/linkedin'; return; }
    if (id === 'fb') { window.location.href = BACKEND_URL + '/auth/facebook'; return; }
    alert(name + ' isn\'t wired up yet!');
}

function disconnect(id, name) {
    delete connected[id];
    var card = document.getElementById('card-' + id);
    card.style.borderColor = '#334155';
    var btn = card.querySelector('button');
    btn.textContent = '+ Connect';
    btn.style.cssText = 'padding:8px 16px;background:' + platformColors[id] + ';color:white;border:none;border-radius:6px;cursor:pointer;';
    btn.onclick = function () { connect(id, name); };
    renderOutput();
}

function toggle(btn) {
    var p = btn.getAttribute('data-p');
    if (selected.includes(p)) {
        selected = selected.filter(function (x) { return x !== p; });
        btn.style.background = '#374151';
        btn.style.color = '#cbd5e1';
    } else {
        selected.push(p);
        btn.style.background = '#6366f1';
        btn.style.color = 'white';
    }
    checkBtn();
}

function checkBtn() {
    var topic = document.getElementById('topic').value.trim();
    var btn = document.getElementById('genBtn');
    if (topic && selected.length > 0) {
        btn.disabled = false;
        btn.style.background = 'linear-gradient(135deg, #6366f1, #8b5cf6)';
        btn.style.color = 'white';
        btn.style.cursor = 'pointer';
        btn.innerHTML = '✨ Generate Content for ' + selected.length + ' platform' + (selected.length > 1 ? 's' : '');
    } else {
        btn.disabled = true;
        btn.style.background = '#374151';
        btn.style.color = '#9ca3af';
        btn.innerHTML = 'Generate Content';
    }
}

document.getElementById('topic').addEventListener('input', checkBtn);

function generate() {
    var topic = document.getElementById('topic').value.trim();
    if (!topic || !selected.length) return;

    var btn = document.getElementById('genBtn');
    btn.innerHTML = '⏳ Generating...';
    btn.disabled = true;

    setTimeout(function () {
        contents = selected.map(function (s) {
            return {
                platform: s,
                content: 'Content about ' + topic + ' for ' + s + '\n\n' +
                    'Key Points:\n\n' +
                    '• Important information about ' + topic + '\n' +
                    '• Research shows significant impact\n' +
                    '• Experts recommend action\n\n' +
                    'Details:\n' + topic + ' continues evolving.\n\n' +
                    '#ContentGenPro'
            };
        });

        renderOutput();
        btn.disabled = false;
        checkBtn();
        alert('Generated ' + contents.length + ' pieces of content!');
    }, 1200);
}

function isPlatformConnected(platform) {
    var map = { LinkedIn: 'li', Twitter: 'tw', Instagram: 'ig', Facebook: 'fb', YouTube: 'yt' };
    return !!connected[map[platform]];
}

function renderOutput() {
    var out = document.getElementById('output');
    if (!contents.length) { out.innerHTML = ''; return; }
    out.innerHTML = '';

    var header = document.createElement('h2');
    header.style.cssText = 'color:white;font-size:22px;margin-bottom:20px;';
    header.textContent = '📄 Generated Content (' + contents.length + ')';
    out.appendChild(header);

    contents.forEach(function (item, i) {
        var isConnected = isPlatformConnected(item.platform);
        var card = document.createElement('div');
        card.style.cssText = 'background:#1e293b;border:1px solid #334155;border-radius:14px;margin-bottom:16px;overflow:hidden;';

        var head = document.createElement('div');
        head.style.cssText = 'padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:#0f172a;border-bottom:1px solid #334155;';

        var left = document.createElement('div');
        var wordCount = Math.floor(120 + Math.random() * 200);
        left.innerHTML = '<strong style="color:white;font-size:16px;">' + item.platform + '</strong> ' +
            '<span style="color:#94a3b8;font-size:13px;">' + wordCount + ' words</span>';

        var right = document.createElement('div');
        right.style.cssText = 'display:flex;gap:8px';

        var postBtn = document.createElement('button');
        postBtn.style.cssText = 'padding:8px 16px;background:' + (isConnected ? '#10b981' : '#475569') + ';border:none;border-radius:8px;color:white;cursor:pointer;font-weight:600;font-size:12px;';
        postBtn.textContent = isConnected ? '📤 POST' : '🔒 Connect First';
        postBtn.onclick = function (e) { postToSocial(i, e); };

        var copyBtn = document.createElement('button');
        copyBtn.style.cssText = 'padding:8px 16px;background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.3);color:#818cf8;border-radius:8px;cursor:pointer;font-weight:600;font-size:12px;';
        copyBtn.textContent = '📋 Copy';
        copyBtn.onclick = function () { copyText(i); };

        right.appendChild(postBtn);
        right.appendChild(copyBtn);
        head.appendChild(left);
        head.appendChild(right);

        var pre = document.createElement('pre');
        pre.style.cssText = 'padding:18px;color:#cbd5e1;font-size:13px;line-height:1.6;white-space:pre-wrap;background:rgba(15,23,42,0.5);margin:16px;border-radius:8px;overflow-x:auto;max-height:300px;';
        pre.textContent = item.content;

        card.appendChild(head);
        card.appendChild(pre);
        out.appendChild(card);
    });
}

function copyText(index) {
    var item = contents[index];
    if (!item) return;
    navigator.clipboard.writeText(item.content).then(function () { alert('Copied!'); });
}

function postToSocial(index, event) {
    var item = contents[index];
    if (!item) return;

    if (!isPlatformConnected(item.platform)) {
        alert('Please connect ' + item.platform + ' first!');
        return;
    }

    var btn = event.target || event.srcElement;
    var originalText = btn.textContent;

    // --- FACEBOOK POST LOGIC (uses the connected user's own Page token) ---
    if (item.platform === 'Facebook') {
        btn.textContent = 'Posting...';
        btn.disabled = true;

        fetch(BACKEND_URL + '/api/facebook/post', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: item.content })
        })
        .then(function (r) { return r.json().then(function (data) { return { ok: r.ok, data: data }; }); })
        .then(function (result) {
            btn.disabled = false;
            if (result.ok && result.data.success) {
                btn.textContent = '✅ Posted!';
                alert('Success! Content posted to your Facebook Page.');
            } else {
                btn.textContent = originalText;
                alert('Facebook Error: ' + JSON.stringify(result.data.error || result.data));
            }
        })
        .catch(function (err) {
            btn.disabled = false;
            btn.textContent = originalText;
            alert('Could not reach backend: ' + err.message);
        });
        return;
    }

    // --- LINKEDIN POST LOGIC ---
    if (item.platform === 'LinkedIn') {
        btn.textContent = 'Posting...';
        btn.disabled = true;

        fetch(BACKEND_URL + '/api/linkedin/post', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: item.content })
        })
        .then(function (r) { return r.json().then(function (data) { return { ok: r.ok, data: data }; }); })
        .then(function (result) {
            btn.disabled = false;
            if (result.ok && result.data.success) {
                btn.textContent = '✅ Posted!';
                alert('Posted to LinkedIn for real!');
            } else {
                btn.textContent = originalText;
                alert('LinkedIn post failed: ' + (result.data.error || 'unknown error'));
            }
        })
        .catch(function (err) {
            btn.disabled = false;
            btn.textContent = originalText;
            alert('Could not reach backend. ' + err.message);
        });
        return;
    }

    // Other platforms fallback (not wired up yet)
    navigator.clipboard.writeText(item.content);
    var urls = { Twitter: 'https://twitter.com/compose/tweet', Instagram: 'https://www.instagram.com/', YouTube: 'https://studio.youtube.com/' };
    window.open(urls[item.platform], '_blank');
    alert('Posted to ' + item.platform + '! Content copied.');
}
</script>
</body>
</html>
